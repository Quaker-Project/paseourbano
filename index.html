<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Urban Crime Audit</title>

<style>

body{
font-family:Arial;
padding:20px;
max-width:500px;
margin:auto;
}

input,select,textarea,button{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:12px;
font-size:16px;
}

button{
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
}

#locationStatus{
font-size:14px;
color:#444;
}

</style>

</head>

<body>

<h2>Registrar punto</h2>

<input id="student" placeholder="Nombre o grupo">

<select id="mission">
<option value="comercio_local">Comercio local</option>
<option value="comercio_turistico">Comercio turístico</option>
<option value="espacio_permanencia">Lugar para quedarse</option>
<option value="arquitectura_hostil">Arquitectura hostil</option>
<option value="delito_plausible">Lugar para delito</option>
</select>

<textarea id="comment" placeholder="Comentario"></textarea>

<button onclick="getLocation()">Capturar ubicación 📍</button>

<p id="locationStatus">Ubicación no registrada</p>

<input type="file" id="photo" accept="image/*" capture="environment">

<button onclick="send()">Enviar registro</button>

<p id="status"></p>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxqNEETwQmG-1_cOP3CVvRCzCWH6DUsRPGmk8JKaOoa3RXEjqmsOU2QQy8zmbsEoJf0wA/exec";

let lat = null;
let lon = null;
let accuracy = null;

function getLocation(){

navigator.geolocation.getCurrentPosition(

function(pos){

lat = pos.coords.latitude;
lon = pos.coords.longitude;
accuracy = pos.coords.accuracy;

document.getElementById("locationStatus").innerText =
"Ubicación registrada ✔ (" +
lat.toFixed(5) + "," +
lon.toFixed(5) + ")";

},

function(){

document.getElementById("locationStatus").innerText =
"No se pudo obtener la ubicación";

}

);

}

async function send(){

if(lat === null){

alert("Primero captura la ubicación");

return;

}

let student = document.getElementById("student").value;
let mission = document.getElementById("mission").value;
let comment = document.getElementById("comment").value;

let file = document.getElementById("photo").files[0];

let photoBase64 = "";

if(file){

photoBase64 = await compressImage(file);

}

let payload = {

student,
mission,
comment,
lat,
lon,
accuracy,
photo: photoBase64

};

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(payload)
})
.then(r=>r.text())
.then(()=>{

document.getElementById("status").innerText="Registro enviado ✔";

});

}

function compressImage(file){

return new Promise(resolve => {

let reader = new FileReader();

reader.onload = function(e){

let img = new Image();

img.onload = function(){

let canvas = document.createElement("canvas");

let maxSize = 800;

let ratio = Math.min(maxSize/img.width, maxSize/img.height);

canvas.width = img.width * ratio;
canvas.height = img.height * ratio;

let ctx = canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

let base64 = canvas.toDataURL("image/jpeg",0.7);

resolve(base64.split(",")[1]);

};

img.src = e.target.result;

};

reader.readAsDataURL(file);

});

}

</script>

</body>
</html>
